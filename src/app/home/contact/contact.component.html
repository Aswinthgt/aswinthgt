<div class="section-container" id="contact">
    <div class="footer-split">
        <div class="cta-side" data-aos="fade-up">
            <h2 class="cta-heading font-roboto-slab">Let's Talk</h2>
            <p class="cta-sub font-alegreya-sans">Have a project in mind?</p>
            <div class="social-row">
                <i (click)="goTo(links.linkedIn)" class="bi bi-linkedin social-icon"></i>
                <i (click)="goTo(links.wa)" class="bi bi-whatsapp social-icon"></i>
                <i (click)="goTo(links.fb)" class="bi bi-facebook social-icon"></i>
                <i (click)="goTo(links.gitHub)" class="bi bi-github social-icon"></i>
            </div>
        </div>

        <div class="links-side">
            <button matRipple (click)="goTo(links.mail)" class="contact-link scroll-reveal-item font-alegreya-sans"
                appScrollReveal style="transition-delay: 100ms">
                <span class="label">Email</span>
                <span class="value">aswinthgt&#64;gmail.com</span>
                <mat-icon>north_east</mat-icon>
            </button>
            <button matRipple (click)="goTo(links.tel)" class="contact-link scroll-reveal-item font-alegreya-sans"
                appScrollReveal style="transition-delay: 200ms">
                <span class="label">Phone</span>
                <span class="value">+91 9025294492</span>
                <mat-icon>north_east</mat-icon>
            </button>
            <button matRipple (click)="goTo(links.location)" class="contact-link scroll-reveal-item font-alegreya-sans"
                appScrollReveal style="transition-delay: 300ms">
                <span class="label">Location</span>
                <span class="value">Kochi, Kerala, India</span>
                <mat-icon>north_east</mat-icon>
            </button>
        </div>
    </div>

    <div class="copyright font-roboto-slab">
        thanks for scrolling
    </div>
</div>
