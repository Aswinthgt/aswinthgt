<div class="row container-testimonial">
    <div class="col-1"></div>
    <div class="col-7">
        <div class="row">
            <div class="col-12">
                <div class="">
                    <span class="heading font-roboto-slab">Testimonial</span>
                </div>
            </div>
            <div class="col-2">
                <div class="yellow-line line"></div>
            </div>
            <div class="col-10">
                <div class="content font-alegreya-sans">
                    {{testimonial.appreciation}}
                </div>
                <div class="by-name font-roboto-slab">{{testimonial.by}}</div>
                <div class="d-flex align-items-center mt-0">
                    <span class="yellow-line by-position"></span>
                    <span class="ms-3 by-position-content font-alegreya-sans">{{testimonial.byPosition}}</span>
                </div>
            </div>
        </div>
    </div>
    <div class="col-4 d-flex align-items-center">
        <div class="right">
            <div class="right-back d-flex justify-content-center">
                <img class="image" src="images/profile-light.png" alt="">
            </div>
        </div>
    </div>
</div>
