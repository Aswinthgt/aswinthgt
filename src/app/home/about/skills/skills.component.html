<div class="row mt-3">
    <div class="col-12">
        <app-icons-card [iconDetails]="showData"></app-icons-card>
    </div>

    @if(iconData.length && isMobile){
    <div class="col-12 mt-5 d-flex justify-content-center">
        <button (click)="showMore()" matRipple class="button">
            View More ({{ iconData.length >= 4 ? 4 : iconData.length }})
        </button>
    </div>
    }
</div>
