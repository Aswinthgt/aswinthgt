<div class="row d-flex justify-content-center">
    @for(icon of iconDetails(); track $index){
    <div class="col-6 col-md-3 mt-4" matRipple>
        <div class="icon">
            <div class="container">
                <!-- <img src="image.png" alt="Image" class="image"> -->
                <img [src]="icon.iconUrl" alt="SVG Image" class="svg-image">
            </div>
            <div class="d-flex justify-content-center iconName">{{icon.iconName}}</div>
        </div>
    </div>
    }

</div>
