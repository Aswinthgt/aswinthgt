<div class="hero-container">
  <div class="background-decor-left"></div>
  <div class="background-decor-right"></div>

  <div class="hero-center" data-aos="fade-up">
    <div class="profile-video-wrapper">
      <video #introVideo class="main-video" playsinline (ended)="onVideoEnd()" aria-label="Aswinth GT Profile Video" title="Aswinth GT Profile Video">
        <source src="Aswinth_intro.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>

    <div class="hero-content">
      <h1 class="main-title font-roboto-slab">Aswinth GT</h1>

      <div class="role-container font-noto-sans">
        <div class="static-line">I am a</div>

        <div class="dynamic-line zero-jitter-container">
          <!-- Ghost Element for Stability (Max Width Role) -->
          <span class="ghost-text"><span class="highlighted-role">MERN Stack Developer</span><span class="cursor"></span></span>

          <!-- Visible Typing Text -->
          <span class="visible-text">
            <span class="highlighted-role">{{ currentText() }}</span><span class="cursor"></span>
          </span>
        </div>
      </div>

      <div class="action-barrier">
        <button matRipple class="secondary-cta font-alegreya-sans" [class.playing]="isPlaying" (click)="startExperience()">
          @if (isPlaying) {
            <div class="wave-loader">
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
            </div>
            Playing Intro...
          } @else {
            <mat-icon>play_arrow</mat-icon> Play Intro
          }
        </button>
        <button matRipple class="primary-cta font-alegreya-sans" (click)="goTo('contact')">
          Let's Connect <mat-icon>arrow_forward</mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>
