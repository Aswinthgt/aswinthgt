<div class="chat-widget" [class.open]="isOpen()">
    <!-- Chat Button -->
    <button class="chat-toggle-btn" (click)="toggleChat()" aria-label="Toggle Chat">
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="feather feather-message-square icon-chat">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2-2z"></path>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="feather feather-chevron-down icon-close">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </div>
    </button>

    <!-- Chat Window -->
    <div class="chat-window" *ngIf="isOpen()">
        <div class="chat-header">
            <div class="header-info">
                <div class="avatar-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="feather feather-zap">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                    </svg>
                </div>
                <div>
                    <h3>AI Assistant</h3>
                    <span class="status-dot"></span> <small>Online</small>
                </div>
            </div>
            <button class="close-btn" (click)="toggleChat()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-x">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <div class="chat-messages" #scrollContainer>
            <div class="message-group" *ngFor="let msg of messages()" [class.user-group]="msg.role === 'user'"
                [class.assistant-group]="msg.role === 'assistant'">
                <div class="message" [class.user]="msg.role === 'user'" [class.assistant]="msg.role === 'assistant'">
                    <div class="message-content"><markdown [data]="msg.content"></markdown></div>
                </div>
            </div>

            @if(this.premiseResource.isLoading()){
            <div class="message-group assistant">
                <div class="message assistant typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
            }

        </div>

        <div class="chat-input">
            <input type="text" [ngModel]="userMessage()" (ngModelChange)="userMessage.set($event)"
                (keyup.enter)="sendMessage()" placeholder="Message..." [disabled]="this.premiseResource.isLoading()" />
            <button (click)="sendMessage()" [disabled]="!userMessage() || this.premiseResource.isLoading()"
                class="send-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-arrow-up">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
            </button>
        </div>
    </div>
</div>
